name: .NET

on: push

jobs:
  build:
    strategy:
        matrix:
          os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore Elib2Ebook.sln

    - name: Build
      run: dotnet build --no-restore -c release Elib2Ebook.sln

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore Elib2Ebook.sln

    - name: Build
      run: dotnet build --no-restore -c release Elib2Ebook.sln

    - name: Test
      run: dotnet test --no-build -c release --verbosity normal Elib2Ebook.sln

  publish:
    needs: test
    strategy:
        matrix:
          os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore Elib2Ebook.sln

    - name: Build
      run: dotnet build --no-restore -c release Elib2Ebook.sln

    - name: Min
      run: >
        dotnet publish -c release -p:PublishDir=../../dist/min --no-self-contained
        -p:PublishSingleFile=true -p:IncludeAllContentForSelfExtract=true -p:DebugType=embedded -p:PublishTrimmed=false
        -p:EnableCompressionInSingleFile=false --use-current-runtime src/Elib2EbookCli/Elib2EbookCli.csproj

    - name: Portable
      run: >
        dotnet publish -c release -p:PublishDir=../../dist/portable --self-contained
        -p:PublishSingleFile=true -p:IncludeAllContentForSelfExtract=true -p:DebugType=embedded
        -p:EnableCompressionInSingleFile=true --use-current-runtime src/Elib2EbookCli/Elib2EbookCli.csproj

    - uses: actions/upload-artifact@v7
      with:
        name: Elib2Ebook-${{ matrix.os }}-min
        path: ${{ github.workspace }}/dist/min

    - uses: actions/upload-artifact@v7
      with:
        name: Elib2Ebook-${{ matrix.os }}-portable
        path: ${{ github.workspace }}/dist/portable

  check_version:
    name: Check version
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    outputs:
      VERSION: ${{ steps.get-version.outputs.version }}
      LAST_TAG: ${{ steps.last_release_tag.outputs.tag_name }}

    steps:
      - name: check repository
        uses: actions/checkout@v5

      - uses: kzrnm/get-net-sdk-project-versions-action@v3.1.0
        id: get-version
        with:
          proj-path: Directory.Build.props

      - name: "get-last-release"
        id: last_release
        uses: octokit/request-action@v3.0.0
        with:
          route: GET /repos/{owner}/{repo}/releases/latest
          owner: OnlyFart
          repo: Elib2Ebook
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: extract-last-release-tag
        id: last_release_tag
        run: echo "tag_name=$(echo '${{ steps.last_release.outputs.data }}' | jq -r '.tag_name')" >> $GITHUB_OUTPUT

  push_to_registry:
    name: push docker image to hub
    runs-on: ubuntu-latest
    needs: check_version
    if: ${{ needs.check_version.outputs.LAST_TAG != needs.check_version.outputs.VERSION }}

    strategy:
      matrix:
        folder: [ Elib2EbookCli, Elib2EbookWeb ]

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: check repository
        uses: actions/checkout@v5

      - name: login to docker registry
        uses: docker/login-action@v4.4.0
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - id: string
        run: echo "lowercase=$(echo '${{ matrix.folder }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: build and push docker image to registry
        uses: docker/build-push-action@v7.3.0
        with:
          platforms: linux/amd64, linux/arm64
          file: "src/${{ matrix.folder }}/Dockerfile"
          push: true
          tags: ${{secrets.DOCKERHUB_NAMESPACE}}/${{ steps.string.outputs.lowercase }}:${{ needs.check_version.outputs.VERSION }},${{secrets.DOCKERHUB_NAMESPACE}}/${{ steps.string.outputs.lowercase }}:latest

  create_release:
    needs: check_version
    runs-on: ubuntu-latest
    if: ${{ needs.check_version.outputs.LAST_TAG != needs.check_version.outputs.VERSION }}
    outputs:
      TAG_NAME: ${{ steps.tag_name.outputs.tag }}

    steps:
      - name: check repository
        uses: actions/checkout@v5

      - name: create release
        uses: softprops/action-gh-release@v3.0.1
        id: create_release
        with:
          draft: false
          prerelease: false
          name: ${{needs.check_version.outputs.VERSION}}
          tag_name: ${{needs.check_version.outputs.VERSION}}
          token: ${{ github.token }}

      - name: save tag name
        id: tag_name
        run: echo "tag=${{needs.check_version.outputs.VERSION}}" >> $GITHUB_OUTPUT

  upload_release:
    needs: [create_release, publish]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        version: [ min, portable ]

    steps:
      - name: download-artifact-${{ matrix.os }}-${{ matrix.version }}
        uses: actions/download-artifact@v8
        with:
          name: Elib2Ebook-${{ matrix.os }}-${{ matrix.version }}
          path: ${{ github.workspace }}/${{ matrix.os }}-${{ matrix.version }}

      - name: Zip output
        run: zip -qq -x "*.pdb" -r ../Elib2Ebook-${{ matrix.os }}-${{ matrix.version }}.zip .
        working-directory: ${{ github.workspace }}/${{ matrix.os }}-${{ matrix.version }}

      - name: upload ${{ matrix.os }}-${{ matrix.version }} asset
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.create_release.outputs.TAG_NAME }}
          files: Elib2Ebook-${{ matrix.os }}-${{ matrix.version }}.zip
          token: ${{ github.token }}
